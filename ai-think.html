<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI — Thinking</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #040610; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 800;
const CX = W / 2, CY = H / 2 - 28;
const R = 198, PERSP = 760;
const ROT_X = 0.32; // fixed tilt (radians)

// ── Fibonacci sphere ───────────────────────────────────────────────
function fibSphere(n) {
  const pts = [], g = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / (n - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const t = g * i;
    pts.push([r * Math.cos(t), y, r * Math.sin(t)]);
  }
  return pts;
}

// ── Great-circle ring ──────────────────────────────────────────────
function makeRing(n, ax, ay, az) {
  const len = Math.sqrt(ax*ax + ay*ay + az*az);
  ax /= len; ay /= len; az /= len;
  let ux, uy, uz;
  if (Math.abs(ax) < 0.9) { ux = 0; uy = az; uz = -ay; }
  else                     { ux = ay; uy = -ax; uz = 0; }
  const ul = Math.sqrt(ux*ux + uy*uy + uz*uz);
  ux /= ul; uy /= ul; uz /= ul;
  const vx = ay*uz - az*uy, vy = az*ux - ax*uz, vz = ax*uy - ay*ux;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const c = Math.cos(a), s = Math.sin(a);
    pts.push([c*ux + s*vx, c*uy + s*vy, c*uz + s*vz]);
  }
  return pts;
}

// ── Rotation + projection ──────────────────────────────────────────
function rotP(p, ry) {
  const [x, y, z] = p;
  const x1 =  x * Math.cos(ry) + z * Math.sin(ry);
  const z1 = -x * Math.sin(ry) + z * Math.cos(ry);
  const y2 =  y * Math.cos(ROT_X) - z1 * Math.sin(ROT_X);
  const z2 =  y * Math.sin(ROT_X) + z1 * Math.cos(ROT_X);
  return [x1, y2, z2];
}
function projP([x, y, z]) {
  const s = PERSP / (PERSP + z * R);
  return [CX + x * R * s, CY + y * R * s, z]; // sx, sy, depth
}

// ── Geometry data ──────────────────────────────────────────────────
const sPts = fibSphere(230);

// Precompute neighbor connections (angular distance < 23°)
const CONN_COS = Math.cos(23 * Math.PI / 180);
const conns = [];
for (let i = 0; i < sPts.length; i++)
  for (let j = i + 1; j < sPts.length; j++) {
    const [a, b] = [sPts[i], sPts[j]];
    if (a[0]*b[0] + a[1]*b[1] + a[2]*b[2] > CONN_COS)
      conns.push([i, j]);
  }

const RINGS = [
  { pts: makeRing(64, 0, 1, 0.25),   speed: 1.9,  col: '#00ffee', ppos: 0  },
  { pts: makeRing(56, 1, 0.1, 0.4),  speed: -1.5, col: '#4488ff', ppos: 18 },
  { pts: makeRing(50, 0.6, 0.6, 1),  speed: 2.3,  col: '#cc44ff', ppos: 38 },
];

// ── Surface pulse waves ────────────────────────────────────────────
const surPulses = [];
function newPulse() {
  const φ = Math.acos(2 * Math.random() - 1);
  const λ = Math.random() * Math.PI * 2;
  surPulses.push({
    ox: Math.sin(φ)*Math.cos(λ), oy: Math.cos(φ), oz: Math.sin(φ)*Math.sin(λ),
    a: 0, spd: 0.006 + Math.random() * 0.005,
  });
}
for (let i = 0; i < 3; i++) newPulse();

function getGlow(bx, by, bz) {
  let g = 0;
  for (const p of surPulses) {
    const dot   = Math.max(-1, Math.min(1, bx*p.ox + by*p.oy + bz*p.oz));
    const dist  = Math.acos(dot);
    const diff  = Math.abs(dist - p.a);
    g = Math.max(g, Math.max(0, 1 - diff / 0.14));
  }
  return g;
}

// ── Tasks ──────────────────────────────────────────────────────────
const TASKS = [
  'Analyzing context vectors…',
  'Searching semantic space…',
  'Optimizing response path…',
  'Loading neural weights…',
  'Cross-referencing memory…',
  'Synthesizing output tokens…',
  'Running attention layers…',
  'Calibrating parameters…',
  'Encoding token embeddings…',
  'Resolving graph dependencies…',
  'Sampling from distribution…',
  'Performing beam search…',
  'Aligning value function…',
  'Pruning attention heads…',
  'Verifying internal state…',
  'Compressing latent space…',
];
let taskIdx = 0, taskAlpha = 1, taskState = 'hold', taskAge = 0;

function updateTask() {
  taskAge++;
  if (taskState === 'hold' && taskAge > 185) taskState = 'out';
  if (taskState === 'out') {
    taskAlpha -= 0.022;
    if (taskAlpha <= 0) { taskAlpha = 0; taskAge = 0; taskIdx = (taskIdx + 1) % TASKS.length; taskState = 'in'; }
  }
  if (taskState === 'in') {
    taskAlpha = Math.min(1, taskAlpha + 0.028);
    if (taskAlpha >= 1) taskState = 'hold';
  }
}

// ── State ──────────────────────────────────────────────────────────
let rotY = 0;

// ── Draw ───────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = 'rgba(4,6,16,0.88)';
  ctx.fillRect(0, 0, W, H);
}

function drawOrbAura() {
  // core glow
  const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, R * 1.45);
  g.addColorStop(0,    'rgba(20,60,210,0.09)');
  g.addColorStop(0.45, 'rgba(0,110,255,0.05)');
  g.addColorStop(1,    'transparent');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // rim
  const g2 = ctx.createRadialGradient(CX, CY, R * 0.88, CX, CY, R * 1.18);
  g2.addColorStop(0, 'transparent');
  g2.addColorStop(0.5, 'rgba(0,180,255,0.055)');
  g2.addColorStop(1,   'transparent');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);
}

function drawSphere() {
  // Project all sphere pts
  const pp = sPts.map((b, i) => {
    const [sx, sy, depth] = projP(rotP(b, rotY));
    const t    = (depth + 1) / 2;
    const glow = getGlow(b[0], b[1], b[2]);
    return { sx, sy, t, depth, glow, i };
  });

  // Connections
  ctx.lineWidth = 0.5;
  for (const [i, j] of conns) {
    const a = pp[i], b = pp[j];
    const t = (a.t + b.t) / 2;
    const g = Math.max(a.glow, b.glow);
    ctx.strokeStyle = `rgba(50,140,255,${Math.max(0.02, 0.04 + t * 0.12 + g * 0.38)})`;
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }

  // Sort back → front
  pp.sort((a, b) => a.depth - b.depth);

  // Normal dots (no glow)
  for (const p of pp) {
    if (p.glow > 0.15) continue;
    const r     = 1.2 + p.t * 2.2;
    const G     = Math.round(65  + p.t * 100);
    const B     = Math.round(150 + p.t * 105);
    const alpha = 0.1 + p.t * 0.58;
    ctx.fillStyle = `rgba(25,${G},${B},${alpha})`;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, r, 0, Math.PI * 2); ctx.fill();
  }

  // Glowing dots (pulse-lit) — batched for perf
  ctx.shadowColor = 'rgba(0,220,255,1)';
  for (const p of pp) {
    if (p.glow <= 0.15) continue;
    const r     = 1.5 + p.t * 2.5 + p.glow * 4.5;
    const G     = Math.round(80  + p.t * 100 + p.glow * 80);
    const B     = Math.round(155 + p.t * 100);
    const alpha = 0.2 + p.t * 0.55 + p.glow * 0.45;
    ctx.shadowBlur = 12 * p.glow;
    ctx.fillStyle  = `rgba(30,${G},${B},${alpha})`;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawRings() {
  for (const ring of RINGS) {
    const rp = ring.pts.map(b => {
      const [sx, sy, depth] = projP(rotP(b, rotY));
      return { sx, sy, depth };
    });

    // ring path (lines)
    ctx.lineWidth = 0.7;
    for (let i = 0; i < rp.length; i++) {
      const a = rp[i], b = rp[(i + 1) % rp.length];
      const t   = ((a.depth + b.depth) / 2 + 1) / 2;
      const hex = Math.round((0.06 + t * 0.20) * 255).toString(16).padStart(2, '0');
      ctx.strokeStyle = ring.col + hex;
      ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    }

    // ring dots
    for (const p of rp) {
      const t   = (p.depth + 1) / 2;
      const hex = Math.round((0.12 + t * 0.55) * 255).toString(16).padStart(2, '0');
      ctx.fillStyle = ring.col + hex;
      ctx.beginPath(); ctx.arc(p.sx, p.sy, 0.9 + t * 1.6, 0, Math.PI * 2); ctx.fill();
    }

    // ── Pulse dot ──────────────────────────────────────────────────
    const pi = Math.floor(ring.ppos) % ring.pts.length;
    const [psx, psy, pdepth] = projP(rotP(ring.pts[pi], rotY));
    const pt = (pdepth + 1) / 2;

    ctx.shadowColor = ring.col; ctx.shadowBlur = 24;
    ctx.fillStyle   = `rgba(255,255,255,${0.75 + pt * 0.25})`;
    ctx.beginPath(); ctx.arc(psx, psy, 4 + pt * 3, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = ring.col + '50';
    ctx.beginPath(); ctx.arc(psx, psy, 10 + pt * 5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // trail dots (3 behind the pulse)
    for (let t2 = 1; t2 <= 3; t2++) {
      const ti   = ((pi - t2) % ring.pts.length + ring.pts.length) % ring.pts.length;
      const [tx, ty, td] = projP(rotP(ring.pts[ti], rotY));
      const ta = (1 - t2 / 4) * 0.5 * ((td + 1) / 2 + 0.3);
      ctx.fillStyle = ring.col + Math.round(ta * 255).toString(16).padStart(2, '0');
      ctx.beginPath(); ctx.arc(tx, ty, 2 + (1 - t2/4) * 2, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawTaskUI(ts) {
  const baseY = CY + R + 65;

  // Task text
  ctx.globalAlpha = taskAlpha;
  ctx.font        = '15px Courier New';
  ctx.textAlign   = 'center';
  ctx.fillStyle   = '#00ffee';
  ctx.shadowColor = '#00ffee'; ctx.shadowBlur = 10;
  ctx.fillText(TASKS[taskIdx], CX, baseY);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  // Spinner dots
  const ndots = Math.floor((ts / 370) % 4);
  ctx.font      = '11px Courier New';
  ctx.fillStyle = 'rgba(80,160,255,0.42)';
  ctx.fillText('processing' + '·'.repeat(ndots), CX, baseY + 26);

  // Progress bar
  const bW = 250, bX = CX - bW / 2, bY = baseY + 46;
  const prog = (ts % 2700) / 2700;

  ctx.fillStyle = 'rgba(0,255,238,0.06)';
  ctx.fillRect(bX, bY, bW, 2);
  const barG = ctx.createLinearGradient(bX, 0, bX + bW, 0);
  barG.addColorStop(0, 'rgba(0,80,255,0.5)');
  barG.addColorStop(1, 'rgba(0,255,238,0.9)');
  ctx.fillStyle = barG;
  ctx.fillRect(bX, bY, bW * prog, 2);
  ctx.shadowColor = '#00ffee'; ctx.shadowBlur = 9;
  ctx.fillStyle   = '#00ffee';
  ctx.beginPath(); ctx.arc(bX + bW * prog, bY + 1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur  = 0;
}

function drawHUD(ts) {
  ctx.font      = '10px Courier New';
  ctx.fillStyle = 'rgba(0,190,255,0.18)';
  ctx.textAlign = 'left';
  ctx.fillText(`INFERENCE_ENGINE  //  ${String(Math.floor(ts)).padStart(9, '0')} ms`, 18, 28);
  ctx.textAlign = 'right';
  ctx.fillText(`MODEL  v4.1-α`, W - 18, 28);

  ctx.fillStyle = 'rgba(0,190,255,0.1)';
  ctx.textAlign = 'left';
  ctx.fillText(`pts:${sPts.length}  conn:${conns.length}  surf_pulses:${surPulses.length}`, 18, H - 16);
  ctx.textAlign = 'right';
  ctx.fillText(`θ: ${(rotY % (Math.PI * 2)).toFixed(2)} rad`, W - 18, H - 16);
}

// ── Main loop ──────────────────────────────────────────────────────
function animate(ts) {
  drawBg();
  drawOrbAura();
  drawSphere();
  drawRings();
  drawTaskUI(ts);
  drawHUD(ts);
  updateTask();

  rotY += 0.005;
  for (const ring of RINGS)
    ring.ppos = (ring.ppos + Math.abs(ring.speed) * 0.06) % ring.pts.length;

  for (let i = surPulses.length - 1; i >= 0; i--) {
    surPulses[i].a += surPulses[i].spd;
    if (surPulses[i].a > Math.PI) {
      surPulses.splice(i, 1);
      if (Math.random() < 0.85) newPulse();
    }
  }
  if (surPulses.length < 2) newPulse();

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
